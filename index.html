<html lang="es"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Check-in · Tori 2026</title>
<link href="./Check-in · Tori 2026_files/css2" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Inter',sans-serif; background:#e8dfc8; min-height:100dvh; }

#access {
  position:fixed; inset:0; z-index:999;
  background:#1a0f00;
  display:flex; align-items:center; justify-content:center; padding:24px;
}
.access-box {
  background:#fff; border-radius:20px; padding:36px 28px;
  width:100%; max-width:340px; text-align:center;
}
.access-box h1 { font-family:'Playfair Display',serif; font-size:1.6rem; color:#1a0f00; margin-bottom:4px; }
.access-box p  { font-size:0.8rem; color:#8a7a60; margin-bottom:24px; }
.access-box input {
  width:100%; padding:14px; border:2px solid #d4c4a0; border-radius:12px;
  font-size:1.1rem; text-align:center; letter-spacing:0.2em;
  outline:none; margin-bottom:12px; color:#1a0f00; background:#faf8f4;
  font-family:'Inter',sans-serif;
}
.access-box input:focus { border-color:#b8860b; }
.btn-enter {
  width:100%; padding:14px; background:#b8860b; color:#fff;
  border:none; border-radius:12px; font-size:1rem; font-weight:700;
  cursor:pointer; font-family:'Inter',sans-serif;
}
.access-error { color:#c00; font-size:0.85rem; margin-top:10px; min-height:20px; }

#app { display:none; }

#connecting {
  position:fixed; inset:0; z-index:500;
  background:rgba(26,15,0,0.75); backdrop-filter:blur(6px);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:16px; color:#fff;
}
#connecting.hidden { display:none; }
.spinner {
  width:40px; height:40px; border:4px solid rgba(255,255,255,0.2);
  border-top-color:#b8860b; border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
#connecting p { font-size:0.95rem; font-weight:500; }

.hdr {
  position:sticky; top:0; z-index:50;
  background:#d4c49c; border-bottom:2px solid #b8a070;
  padding:14px 16px 12px;
}
.hdr-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.hdr-title { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; color:#1a0f00; }
.hdr-sub { font-size:0.7rem; color:#5a4a20; margin-top:1px; }
.dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#2d8a4f; margin-right:4px; animation:blink 2s infinite; }
.dot.offline { background:#cc3300; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.counters { display:flex; gap:8px; }
.cnt { padding:5px 12px; border-radius:20px; font-size:0.78rem; font-weight:700; }
.cnt-in  { background:#2d8a4f; color:#fff; }
.cnt-tot { background:#1a0f00; color:#fff; }
.searchbox {
  display:flex; align-items:center; gap:8px;
  background:#fff; border:2px solid #c4b48a; border-radius:12px; padding:10px 14px;
}
.searchbox input {
  border:none; outline:none; background:transparent;
  font-size:0.95rem; width:100%; color:#1a0f00; font-family:'Inter',sans-serif;
}
.searchbox input::placeholder { color:#9a8a6a; }

.tabs {
  position:sticky; top:114px; z-index:40;
  background:#c8b888; display:flex; border-bottom:2px solid #b8a070;
}
.tab {
  flex:1; padding:11px 4px; border:none; background:none;
  font-family:'Inter',sans-serif; font-size:0.78rem; font-weight:600;
  color:#5a4820; cursor:pointer; border-bottom:3px solid transparent; transition:all 0.15s;
}
.tab.on { color:#1a0f00; border-bottom-color:#b8860b; }

.list { padding:12px 12px 100px; }
.empty { text-align:center; padding:48px 20px; color:#8a7a60; font-size:0.9rem; }

.fab {
  position:fixed; bottom:24px; right:20px; z-index:60;
  width:56px; height:56px; border-radius:50%;
  background:#b8860b; color:#fff; border:none; font-size:1.8rem;
  cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,0.3);
  display:flex; align-items:center; justify-content:center;
}
.expbtn {
  position:fixed; bottom:28px; left:16px; z-index:60;
  background:#1a0f00; color:#fff; border:none; border-radius:28px;
  padding:12px 18px; font-size:0.82rem; font-weight:600;
  cursor:pointer; display:flex; align-items:center; gap:6px;
  font-family:'Inter',sans-serif; box-shadow:0 4px 16px rgba(0,0,0,0.3);
}

.overlay {
  position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,0.6);
  display:flex; align-items:flex-end; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity 0.2s;
}
.overlay.open { opacity:1; pointer-events:all; }
.mbox {
  background:#fff; border-radius:24px 24px 0 0;
  padding:28px 20px 44px; width:100%; max-width:480px;
  transform:translateY(100%); transition:transform 0.25s;
}
.overlay.open .mbox { transform:translateY(0); }
.mhandle { width:40px; height:4px; border-radius:2px; background:#ccc; margin:0 auto 20px; }
.mbox h3 { font-family:'Playfair Display',serif; font-size:1.3rem; color:#1a0f00; margin-bottom:18px; }
.mbox input {
  width:100%; padding:13px 15px; border:2px solid #d4c4a0; border-radius:12px;
  font-size:1rem; font-family:'Inter',sans-serif; color:#1a0f00; outline:none; margin-bottom:12px;
}
.mbox input:focus { border-color:#b8860b; }
.mbtns { display:flex; gap:10px; }
.mbtn-cancel {
  flex:1; padding:13px; border:2px solid #ddd; border-radius:12px;
  background:#fff; font-family:'Inter',sans-serif; font-size:0.95rem; color:#666; cursor:pointer;
}
.mbtn-add {
  flex:2; padding:13px; background:#b8860b; color:#fff; border:none; border-radius:12px;
  font-family:'Inter',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer;
}

.toast {
  position:fixed; bottom:88px; left:50%;
  transform:translateX(-50%) translateY(10px);
  background:#1a0f00; color:#fff;
  padding:10px 22px; border-radius:20px;
  font-size:0.85rem; font-weight:600;
  opacity:0; transition:all 0.2s; z-index:300;
  white-space:nowrap; pointer-events:none;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="access">
  <div class="access-box">
    <h1>Una Saga Familiar</h1>
    <p>BERGLIAFFA · GREGOROVICH · 2026</p>
    <input type="password" id="pin" placeholder="Código de acceso" maxlength="20" autocomplete="off">
    <button class="btn-enter" onclick="doAccess()">Ingresar →</button>
    <div class="access-error" id="aerr"></div>
  </div>
</div>

<div id="connecting" class="hidden">
  <div class="spinner"></div>
  <p>Conectando…</p>
</div>

<div id="app">
  <div class="hdr">
    <div class="hdr-top">
      <div>
        <div class="hdr-title">Check-in · Tori 2026</div>
        <div class="hdr-sub"><span class="dot" id="dot"></span><span id="sync-label">En tiempo real · Firebase</span></div>
      </div>
      <div class="counters">
        <div class="cnt cnt-in" id="cin">0 ✓</div>
        <div class="cnt cnt-tot" id="ctot">0 total</div>
      </div>
    </div>
    <div class="searchbox">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9a8a6a" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
      <input id="srch" type="text" placeholder="Buscar por nombre…" oninput="render()" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="setTab(&#39;all&#39;,this)">Todos</button>
    <button class="tab" onclick="setTab(&#39;pending&#39;,this)">Pendientes</button>
    <button class="tab" onclick="setTab(&#39;in&#39;,this)">Ingresaron</button>
    <button class="tab" onclick="setTab(&#39;manual&#39;,this)">Manuales</button>
  </div>

  <div class="list" id="list"></div>

  <button class="fab" onclick="openM()">+</button>
  <button class="expbtn" onclick="exportCSV()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
    Exportar
  </button>
</div>

<div class="overlay" id="modal" onclick="if(event.target===this)closeM()">
  <div class="mbox">
    <div class="mhandle"></div>
    <h3>Agregar invitado</h3>
    <input id="mname" type="text" placeholder="Nombre y Apellido" autocomplete="off">
    <div class="mbtns">
      <button class="mbtn-cancel" onclick="closeM()">Cancelar</button>
      <button class="mbtn-add" onclick="addGuest()">Agregar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FB_URL = "https://tori2026-2f449-default-rtdb.firebaseio.com";
const CODE   = "tori2026";
const NAMES  = [
  "Bergliaffa Rubén Dario","Walter Murua","Bergliaffa Julio","Gilardi Oscar Alejandro",
  "Ariel Perez","Bergliaffa Micaela","Blanco María Laura","Pedro Roldán","Melina Acevedo",
  "Griselda Núñez","Jose Meyer","Lucio Migliazzo","Bergliaffa Sofía","González Germán",
  "Griguol Mariana","Butiler Gustavo","Anabel Thanos","Olmedo Dominguez Damiana",
  "Enzo Gilardi Blanco","Bergliaffa Constanza","Moyano Nora","Peralta Leandro",
  "Gilardi Agostina","Bergliaffa Juan Carmelo","Romero Gladis","Victoria Gilardi Blanco",
  "Bergliaffa Stella","Piccatto Piero","Gabriela González","Gustavo Elkin",
  "Bergliaffa Lucas","Cecilia Bandin","Matías Albarracín","Godoy Gaetan Daniel Eduardo",
  "Bergliaffa Yanela María","Bergliaffa Emilse","Arias Franco","Calderon Brandi Claudia",
  "Gonzalez Natalia","Nassif María Elena","Racca Daniela","Gudiño Victor Alejandro",
  "Sanchez Graciela","Cordoba Alicia","Teobaldi Daniel","Giaccaglia María Teresa",
  "Mealla Daniel Gustavo","Victoria Boasi","Migliazzo Jeremías","Martín Carlos Dante",
  "Prisca Gonzalez","Díaz Daniel Eduardo","Mariano Pussetto","Bergliaffa Jose",
  "Silvana Ruth Cuffia","María Antonella Bergliaffa","Gudiño José Fabio",
  "González Agustina","Ferreyra Jorge (Peter)","Nicolas Bergliaffa","Salgán Marcelo",
  "Mercado Gustavo","Mercado Gustavo Hernán","Spaccesi Agustin","Linares Alejo",
  "Puig Hermes","Palacio Ulises","Brunel German","Machado Sofia","Luis Bergliaffa",
  "Peralta Emilia","Julia Villarroel","Meyer Martin","Mariano Castro","Mirta Moyano",
  "Gottardi Marcos","Bergliaffa Nadia","Fernando Vega","Ponce Susana","Vega Mario",
  "Ocampo Rebeca","Heredia Fernanda","Vega Mariano","Guillermo Quinteros",
  "Mia Quinteros","Quinteros Albina","Marcelo Vénica","Bergliaffa Miguel"
];

let db, guestsRef;
let guests = {};
let tab = 'all';

function uid() { return 'g' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function slug(n) { return n.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,'_').slice(0,40); }
function ftime(ts) { if (!ts) return ''; return new Date(ts).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}); }
function initials(n) { const p=n.trim().split(/\s+/); return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():n.slice(0,2).toUpperCase(); }

window.doAccess = function() {
  if (document.getElementById('pin').value.trim().toLowerCase() !== CODE) {
    document.getElementById('aerr').textContent = 'Código incorrecto';
    document.getElementById('pin').value = '';
    return;
  }
  document.getElementById('access').style.display = 'none';
  document.getElementById('connecting').classList.remove('hidden');
  initFirebase();
};
document.getElementById('pin').addEventListener('keydown', e => { if(e.key==='Enter') window.doAccess(); });

function initFirebase() {
  const app = initializeApp({ databaseURL: FB_URL }, 'tori2026app');
  db = getDatabase(app);
  guestsRef = ref(db, 'guests');

  get(guestsRef).then(snap => {
    const updates = {};
    if (!snap.exists()) {
      NAMES.forEach(name => {
        updates[slug(name)+'_'+uid()] = { n: name, ok: false, manual: false, t: 0 };
      });
      set(guestsRef, updates).then(startListening);
    } else {
      const existing = snap.val();
      const existingNames = Object.values(existing).map(g => g.n.toLowerCase().trim());
      NAMES.forEach(name => {
        if (!existingNames.includes(name.toLowerCase().trim())) {
          updates[slug(name)+'_'+uid()] = { n: name, ok: false, manual: false, t: 0 };
        }
      });
      if (Object.keys(updates).length > 0) {
        update(guestsRef, updates).then(startListening);
      } else {
        startListening();
      }
    }
  }).catch(() => {
    document.getElementById('connecting').classList.add('hidden');
    document.getElementById('app').style.display = 'block';
    document.getElementById('dot').classList.add('offline');
    document.getElementById('sync-label').textContent = 'Sin conexión';
  });
}

function startListening() {
  document.getElementById('connecting').classList.add('hidden');
  document.getElementById('app').style.display = 'block';
  onValue(guestsRef, snap => {
    guests = snap.val() || {};
    render(); counters();
  });
}

window.render = function() {
  const q = (document.getElementById('srch')?.value||'').toLowerCase();
  let list = Object.entries(guests)
    .map(([id,g]) => ({id,...g}))
    .filter(g => {
      if (!g.n) return false;
      if (q && !g.n.toLowerCase().includes(q)) return false;
      if (tab==='pending') return !g.ok;
      if (tab==='in')      return !!g.ok;
      if (tab==='manual')  return !!g.manual;
      return true;
    });
  list.sort((a,b) => { if(!!a.ok!==!!b.ok) return a.ok?1:-1; return a.n.localeCompare(b.n,'es'); });

  const el = document.getElementById('list');
  if (!el) return;
  if (!list.length) { el.innerHTML='<div class="empty">No se encontraron invitados</div>'; return; }

  el.innerHTML = list.map(g => {
    const bg      = g.ok ? '#eafaf1' : '#ffffff';
    const bdr     = g.ok ? '#2d8a4f' : '#d4c4a0';
    const avaBg   = g.ok ? '#2d8a4f' : '#5c3d00';
    const nameClr = g.ok ? '#1a5c35' : '#1a0f00';
    const statClr = g.ok ? '#1a7a40' : '#3a2a08';
    return `
    <div onclick="toggle('${g.id}')" style="display:flex;align-items:center;gap:12px;background:${bg};border:2px solid ${bdr};border-radius:14px;padding:13px;margin-bottom:9px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.12);">
      <div style="width:44px;height:44px;border-radius:50%;background:${avaBg};color:#fff;display:flex;align-items:center;justify-content:center;font-size:${g.ok?'1.1rem':'0.82rem'};font-weight:800;flex-shrink:0;font-family:'Inter',sans-serif;">
        ${g.ok?'✓':initials(g.n)}
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:1rem;font-weight:700;color:${nameClr};font-family:'Inter',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;">${g.n}</div>
        <div style="font-size:0.76rem;font-weight:600;color:${statClr};font-family:'Inter',sans-serif;margin-top:3px;">${g.manual?'✦ Manual · ':''}${g.ok?'✓ Ingresó · '+ftime(g.t):'Pendiente'}</div>
      </div>
      <div style="width:34px;height:34px;border-radius:50%;border:2.5px solid ${g.ok?'#2d8a4f':'#b8860b'};background:${g.ok?'#2d8a4f':'#fff'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="${g.ok?'#fff':'#b8860b'}" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
    </div>`;
  }).join('');
};

function counters() {
  const vals = Object.values(guests);
  document.getElementById('cin').textContent  = vals.filter(g=>g.ok).length + ' ✓';
  document.getElementById('ctot').textContent = vals.length + ' total';
}

window.toggle = function(id) {
  const g = guests[id]; if(!g) return;
  const newOk = !g.ok;
  update(ref(db,'guests/'+id), { ok: newOk, t: newOk ? Date.now() : 0 });
  toast(newOk ? `✓ ${g.n.split(' ')[0]} ingresó` : `↩ ${g.n.split(' ')[0]} desmarcado`);
};

window.setTab = function(t, btn) {
  tab = t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('srch').value = '';
  render();
};

window.openM  = () => { document.getElementById('modal').classList.add('open'); setTimeout(()=>document.getElementById('mname').focus(),300); };
window.closeM = () => { document.getElementById('modal').classList.remove('open'); document.getElementById('mname').value=''; };

window.addGuest = function() {
  const n = document.getElementById('mname').value.trim();
  if (n.length < 2) { toast('Ingresá nombre y apellido'); return; }
  if (Object.values(guests).find(g=>g.n.toLowerCase()===n.toLowerCase())) { toast('⚠ Ya existe'); return; }
  update(ref(db,'guests/manual_'+uid()), { n, ok: false, manual: true, t: 0 });
  closeM(); toast('✦ '+n+' agregado');
};
document.getElementById('mname').addEventListener('keydown', e => { if(e.key==='Enter') window.addGuest(); });

window.exportCSV = function() {
  const rows = [['Nombre','Estado','Hora de ingreso','Agregado manualmente']];
  Object.values(guests).forEach(g => rows.push([g.n, g.ok?'Ingresó':'Pendiente', g.t?ftime(g.t):'', g.manual?'Sí':'No']));
  const csv = rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download = 'asistencias_tori_2026.csv';
  a.click();
  toast('📥 Lista exportada');
};

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}
</script>


</body></html>
